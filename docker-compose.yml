services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run web:start
    env_file:
      - apps/web/.env.local
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    env_file:
      - apps/web/.env.local
    restart: unless-stopped
    depends_on:
      - web
